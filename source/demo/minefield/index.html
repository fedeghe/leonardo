<!DOCTYPE html>
<html>
<head>
    $$../_commonHead.html$$
	<title>$DEMO.MINEFIELD.TITLE$</title>
    <script src="./js/index.js"></script>
    <style>
        svg{
            outline: 1px solid #777 !important;
            border-radius: 5px;
            box-shadow: 2px 2px 5px #999;
            display: flex;
        }
        svg text {user-select: none}
        #root{
            width:100vw;
            height:90vh;
            display:flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    
    <div class="cen">
        
        <span id="easier">-</span>
        <input type="range" min="0.1" max="0.5" id="inp">
        <span id="harder">+</span>
        <span id="inpt" class="level"></span>
    </div>
    <div id="root"/>
    <script>(function (){
        var inp = document.getElementById('inp'),
            inpt = document.getElementById('inpt'),
            easier = document.getElementById('easier'),
            harder = document.getElementById('harder'),
            v = 0.2,
            step = 0.01;

        // if step is set after the value ..the value does nto have any effect on the bullet position on the gauge
        inp.step = step;
        inp.value = v;

        inpt.innerHTML = v;
        inp.addEventListener('input', function (e) {
            var val = e.target.value;
            inpt.innerHTML = val;
        });
        inp.addEventListener('change', function (e) {
            var val = e.target.value;
            start(val);
        });
        easier.addEventListener('click', function(){
            if(inp.value > inp.min){
                inp.value-= step
                inpt.innerHTML = inp.value;
                start(inp.value)
            }
        })
        harder.addEventListener('click', function(){
            if(inp.value < inp.max){

                inp.value = parseFloat(inp.value, 10)+ step
                inpt.innerHTML = inp.value;
                start(inp.value)
            }
        })
    })()</script>
</body>
</html>
